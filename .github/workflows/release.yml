name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build and upload release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Validate manifest version
        run: |
          node -e "const fs=require('fs'); const tag=process.env.GITHUB_REF_NAME; const manifest=JSON.parse(fs.readFileSync('manifest.json', 'utf8')); if (manifest.version !== tag) { console.error(`manifest.json version ${manifest.version} does not match tag ${tag}`); process.exit(1); }"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            manifest.json
            main.js
            styles.css
